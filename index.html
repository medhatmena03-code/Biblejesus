<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>مع المسيح كل يوم | آية يومية</title>
    
    <link rel="manifest" href="https://progressier.app/GBvcxvgcW8RRc75Ssg6U/progressier.json"/>
    <script defer src="https://progressier.app/GBvcxvgcW8RRc75Ssg6U/script.js"></script>
    
    <meta name="theme-color" content="#d4af37">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2903/2903510.png">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: linear-gradient(135deg, #0f0c1e 0%, #1a0f2e 50%, #0f0c1e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px; overflow: hidden;
        }
        .card {
            background: rgba(20, 15, 35, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            padding: 40px 25px;
            text-align: center;
            max-width: 450px; width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            z-index: 10;
        }
        .cross { font-size: 50px; color: #d4af37; margin-bottom: 10px; display: block; }
        h1 { color: #d4af37; margin-bottom: 20px; font-size: 1.8rem; }
        .verse-box {
            background: rgba(0,0,0,0.3);
            padding: 25px; border-radius: 25px;
            border-right: 4px solid #d4af37; margin-bottom: 25px;
        }
        .verse-text { color: #f0e6d0; font-size: 1.3rem; line-height: 1.6; }
        .btn-install {
            background: linear-gradient(135deg, #d4af37, #b8942e);
            color: #0f0c1e; border: none; padding: 15px;
            border-radius: 50px; width: 100%; font-weight: bold;
            font-size: 1.1rem; cursor: pointer; transition: 0.3s;
        }
        .floating-cross {
            position: fixed; bottom: 20px; left: 20px;
            width: 60px; height: 60px; background: #d4af37;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 30px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(212,175,55,0.4);
        }
    </style>
</head>
<body>

<div class="card">
    <span class="cross">✝</span>
    <h1>مع المسيح كل يوم</h1>
    <div class="verse-box">
        <div class="verse-text" id="v-text">"أَسْتَطِيعُ كُلَّ شَيْءٍ فِي الْمَسِيحِ الَّذِي يُقَوِّينِي"</div>
        <div style="color:#d4af37; margin-top:10px;">(فيلبي 4:13)</div>
    </div>
    <button class="btn-install" onclick="window.progressier.showInstallationPrompt()">📥 تثبيت التطبيق</button>
</div>

<div class="floating-cross" onclick="alert('وعد الرب: أنا معك كل الأيام!')">✝</div>

</body>
</html>
