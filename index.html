<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>مع المسيح كل يوم | آية يومية</title>
    
    <link rel="manifest" href="https://progressier.app/4fHiAMrqJFGXn869E9xm/progressier.json"/>
    <script defer src="https://progressier.app/4fHiAMrqJFGXn869E9xm/script.js"></script>
    
    <meta name="theme-color" content="#d4af37">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2903/2903510.png">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0c1e 0%, #1a0f2e 100%);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px; color: #f0e6d0;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 35px;
            padding: 40px 25px;
            text-align: center;
            max-width: 400px; width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .cross-header { font-size: 60px; color: #d4af37; margin-bottom: 10px; }
        h1 { font-size: 1.8rem; color: #d4af37; margin-bottom: 25px; }
        .verse-container {
            background: rgba(0,0,0,0.2);
            padding: 20px; border-radius: 20px;
            border-right: 4px solid #d4af37; margin-bottom: 30px;
        }
        .verse-text { font-size: 1.4rem; line-height: 1.6; font-style: italic; }
        .btn-main {
            background: linear-gradient(135deg, #d4af37, #b8942e);
            color: #0f0c1e; border: none; padding: 16px;
            border-radius: 50px; width: 100%; font-weight: bold;
            font-size: 1.1rem; cursor: pointer; transition: 0.3s;
        }
        .btn-main:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="card">
    <div class="cross-header">✝</div>
    <h1>مع المسيح كل يوم</h1>
    
    <div class="verse-container">
        <div class="verse-text">"أَنَا هُوَ الطَّرِيقُ وَالْحَقُّ وَالْحَيَاةُ"</div>
        <div style="color:#d4af37; margin-top:10px; font-size:0.9rem;">(يوحنا 14:6)</div>
    </div>

    <button class="btn-main" onclick="window.progressier.showInstallationPrompt()">📥 تثبيت التطبيق على موبايلك</button>
    
    <p style="margin-top:20px; font-size:0.8rem; opacity:0.7;">بمجرد التثبيت ستصلك آيات يومية 🔔</p>
</div>

</body>
</html>
